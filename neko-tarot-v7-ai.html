<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 ねこタロット - 決断のとき</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Shippori+Mincho:wght@400;600&display=swap');

  :root {
    --bg: #1a1025;
    --bg2: #231530;
    --card-bg: #2d1f3d;
    --accent: #e8b4f8;
    --accent2: #f5d76e;
    --accent3: #a8e6cf;
    --text: #f0e6ff;
    --text-muted: #b09ec0;
    --border: #5a3d7a;
    --glow: rgba(232, 180, 248, 0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Maru Gothic', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 星空背景 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(90, 40, 120, 0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(40, 20, 80, 0.5) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(30, 15, 60, 0.3) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d, 3s) ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 800px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }

  /* ヘッダー */
  header {
    text-align: center;
    padding: 32px 0 24px;
  }

  .cat-emoji {
    font-size: 48px;
    display: block;
    margin-bottom: 8px;
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(22px, 5vw, 32px);
    color: var(--accent);
    letter-spacing: 0.1em;
    text-shadow: 0 0 20px var(--glow);
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.15em;
  }

  /* 質問入力 */
  .question-section {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin: 24px 0;
  }

  .question-label {
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 14px;
    padding: 12px;
    resize: none;
    height: 80px;
    transition: border-color 0.3s;
    outline: none;
  }

  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 12px var(--glow);
  }

  textarea::placeholder { color: var(--text-muted); }

  /* スプレッド説明 */
  .spread-info {
    background: rgba(232, 180, 248, 0.06);
    border: 1px solid rgba(232, 180, 248, 0.2);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 24px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.8;
  }

  .spread-info strong { color: var(--accent2); }

  /* カードグリッド */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .card-slot {
    aspect-ratio: 2/3;
    background: var(--card-bg);
    border: 2px dashed var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .card-slot:hover:not(.revealed) {
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--glow);
    transform: translateY(-3px);
  }

  .card-slot.revealed {
    border: 2px solid var(--border);
    cursor: default;
  }

  .card-slot.reversed .card-img {
    transform: rotate(180deg);
  }

  .card-back {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px;
    text-align: center;
  }

  .card-back-pattern {
    font-size: 28px;
  }

  .position-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    padding: 16px 8px 8px;
    font-size: 11px;
    color: var(--accent2);
    text-align: center;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .position-number {
    font-size: 10px;
    color: var(--text-muted);
    display: block;
    margin-bottom: 2px;
  }

  .card-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .card-tap-hint {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* 全部めくるボタン */
  .btn-reveal-all {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #5a3d7a, #3d2060);
    border: 1px solid var(--accent);
    border-radius: 12px;
    color: var(--accent);
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.3s;
    margin-bottom: 16px;
  }

  .btn-reveal-all:hover {
    background: linear-gradient(135deg, #7a4da0, #5a3080);
    box-shadow: 0 0 24px var(--glow);
    transform: translateY(-2px);
  }

  .btn-reveal-all:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* AI解釈ボタン */
  .btn-ai {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #8b5cf6, #6d28d9);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 24px;
  }

  .btn-ai:hover:not(:disabled) {
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
    box-shadow: 0 4px 30px rgba(139, 92, 246, 0.5);
    transform: translateY(-2px);
  }

  .btn-ai:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* AI解釈結果 */
  .ai-result {
    background: var(--card-bg);
    border: 1px solid var(--accent);
    border-radius: 16px;
    padding: 24px;
    margin-top: 8px;
    box-shadow: 0 0 40px var(--glow);
    display: none;
  }

  .ai-result.show { display: block; }

  .ai-result-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .ai-result-header h3 {
    font-family: 'Shippori Mincho', serif;
    font-size: 17px;
    color: var(--accent);
  }

  .ai-reading {
    font-size: 14px;
    line-height: 2;
    color: var(--text);
    white-space: pre-wrap;
  }

  .ai-reading .card-section {
    margin-bottom: 16px;
    padding: 12px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    border-left: 3px solid var(--accent2);
  }

  .ai-reading .card-section h4 {
    color: var(--accent2);
    font-size: 13px;
    margin-bottom: 6px;
  }

  .ai-reading .summary {
    margin-top: 16px;
    padding: 14px;
    background: rgba(168, 230, 207, 0.08);
    border-radius: 10px;
    border-left: 3px solid var(--accent3);
  }

  .ai-reading .summary h4 {
    color: var(--accent3);
    font-size: 13px;
    margin-bottom: 6px;
  }

  /* ローディング */
  .loading {
    text-align: center;
    padding: 32px;
    color: var(--text-muted);
    font-size: 14px;
  }

  .loading-cats {
    font-size: 28px;
    letter-spacing: 8px;
    animation: bounce 1s ease-in-out infinite;
    display: block;
    margin-bottom: 12px;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* リセットボタン */
  .btn-reset {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text-muted);
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 16px;
  }

  .btn-reset:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* カードめくりアニメ */
  @keyframes flipIn {
    0% { transform: rotateY(90deg) scale(0.8); opacity: 0; }
    100% { transform: rotateY(0) scale(1); opacity: 1; }
  }

  .card-slot.just-revealed {
    animation: flipIn 0.4s ease-out forwards;
  }

  /* 逆位置バッジ */
  .reversed-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(248, 113, 113, 0.8);
    color: white;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 20px;
    font-weight: 700;
    z-index: 2;
  }

  .card-name-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    background: linear-gradient(rgba(0,0,0,0.7), transparent);
    padding: 8px 6px 16px;
    font-size: 9px;
    color: rgba(255,255,255,0.9);
    text-align: center;
    line-height: 1.3;
  }

  /* エラー */
  .error-msg {
    background: rgba(248, 113, 113, 0.1);
    border: 1px solid rgba(248, 113, 113, 0.4);
    border-radius: 10px;
    padding: 12px 16px;
    color: #fca5a5;
    font-size: 13px;
    margin-top: 8px;
    display: none;
  }
  .error-msg.show { display: block; }
</style>
</head>

    ④ 選択肢B　⑤ 導き・アドバイス

  <!-- 全部めくる -->
  <button class="btn-reveal-all" id="btnRevealAll" onclick="revealAll()">

  <!-- AI解釈 -->

  <div class="error-msg" id="errorMsg"></div>

  <!-- リセット -->
  <button class="btn-reset" onclick="resetAll()">🔄 最初からやり直す</button>
</div>

const POSITIONS = [
  { label: '現在の状況', desc: 'あなたが今いる場所' },
  { label: '決断の核心', desc: '何が問われているか' },
  { label: '選択肢 A',   desc: '一方を選んだ場合' },
  { label: '選択肢 B',   desc: '他方を選んだ場合' },
  { label: '導き・アドバイス', desc: '星が示す道標' },
];

// ============================================================
// 状態
// ============================================================
let drawnCards = [];
let revealedCount = 0;

// ============================================================
// 初期化
// ============================================================
function init() {
  createStars();
  drawCards();
  renderGrid();
}

function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    star.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%; left:${Math.random()*100}%;
      --d:${(Math.random()*4+2).toFixed(1)}s;
      animation-delay:${(Math.random()*4).toFixed(1)}s;
    `;
    container.appendChild(star);
  }
}

function drawCards() {
  const shuffled = [...CARDS].sort(() => Math.random() - 0.5);
  drawnCards = shuffled.slice(0, 5).map(card => ({
    ...card,
    reversed: Math.random() < 0.3
  }));
}

function renderGrid() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  drawnCards.forEach((card, i) => {
    const slot = document.createElement('div');
    slot.className = 'card-slot';
    slot.id = `slot-${i}`;
    slot.onclick = () => revealCard(i);
    slot.innerHTML = `
      <div class="card-back">
        <div class="card-back-pattern">🌙</div>
        <div style="font-size:11px;color:var(--text-muted);text-align:center;line-height:1.4">
          <strong style="color:var(--accent2)">${POSITIONS[i].label}</strong><br>
          <span style="font-size:10px">${POSITIONS[i].desc}</span>
        </div>
        <div class="card-tap-hint">タップしてめくる</div>
      </div>
    `;
    grid.appendChild(slot);
  });
  revealedCount = 0;
  document.getElementById('btnAI').disabled = true;
}

// ============================================================
// カードをめくる
// ============================================================
function revealCard(index) {
  const slot = document.getElementById(`slot-${index}`);
  if (slot.classList.contains('revealed')) return;

  const card = drawnCards[index];
  slot.classList.add('revealed', 'just-revealed');
  if (card.reversed) slot.classList.add('reversed');

  setTimeout(() => slot.classList.remove('just-revealed'), 500);

  slot.innerHTML = `
    ${card.reversed ? '<div class="reversed-badge">逆位置</div>' : ''}
    <div class="card-name-overlay">${card.name}</div>
    <img class="card-img" src="${card.img}" alt="${card.name}"
         onerror="this.style.display='none';this.parentElement.querySelector('.card-name-overlay').style.display='none';
         this.insertAdjacentHTML('afterend','<div style=\'display:flex;align-items:center;justify-content:center;height:100%;font-size:28px;flex-direction:column;gap:6px\'><span>🐱</span><span style=\'font-size:11px;color:var(--accent2);text-align:center;padding:0 8px\'>${card.name}</span></div>')">
    <div class="position-label">
      <span class="position-number">Position ${index + 1}</span>
      ${POSITIONS[index].label}
    </div>
  `;

  revealedCount++;
  if (revealedCount === 5) {
    document.getElementById('btnAI').disabled = false;
    document.getElementById('btnRevealAll').disabled = true;
  }
}

function revealAll() {
  for (let i = 0; i < 5; i++) {
    setTimeout(() => revealCard(i), i * 200);
  }
  document.getElementById('btnRevealAll').disabled = true;
}

// ============================================================
// AI解釈
// ============================================================
async function getAIReading() {
  const question = document.getElementById('questionInput').value.trim();
  const btnAI = document.getElementById('btnAI');
  const aiResult = document.getElementById('aiResult');
  const aiReading = document.getElementById('aiReading');
  const errorMsg = document.getElementById('errorMsg');

  errorMsg.classList.remove('show');
  btnAI.disabled = true;
  aiResult.classList.add('show');
  aiReading.innerHTML = `
    <div class="loading">
      <span class="loading-cats">🐱 🔮 🌙</span>
      ねこ先生が星を読んでいるにゃ…
    </div>
  `;

  const cardInfo = drawnCards.map((card, i) => 
    `・${POSITIONS[i].label}：【${card.name}${card.reversed ? '（逆位置）' : ''}】`
  ).join('\n');

  const prompt = `あなたはねこタロット占い師の「ねこ先生」です。
ユーモアがあって親しみやすく、でもちゃんと深い洞察を伝えてくれるキャラクターです。
ねこっぽい表現（「〜にゃ」「〜だにゃ」など）を時々使いますが、多すぎず自然な範囲で。
わかりやすく具体的なアドバイスをしてください。

【ご質問】
${question || '（質問なし：総合的な状況をみてください）'}

【引いたカード】
${cardInfo}

以下の形式で解釈してください：

---カード別の解釈---
各カード（5枚）について、ポジション名・カード名を示してから、2〜3文で具体的に解釈してください。
逆位置の場合はその意味も加味してください。

---総合的なメッセージ---
全体を通じたアドバイスを3〜4文でまとめてください。
「あなたへのねこ先生のひとこと」として締めてください。`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content?.[0]?.text || '';

    if (!text) throw new Error('解釈を取得できませんでした');

    // セクション分割して表示
    const sections = text.split('---総合的なメッセージ---');
    const cardPart = sections[0].replace('---カード別の解釈---', '').trim();
    const summaryPart = sections[1]?.trim() || '';

    // カード別をパース
    const cardLines = cardPart.split('\n').filter(l => l.trim());
    let cardHTML = '';
    let currentCard = null;
    let currentText = [];

    cardLines.forEach(line => {
      const posMatch = drawnCards.some((c, i) => 
        line.includes(POSITIONS[i].label) || line.includes(c.name)
      );
      if ((line.startsWith('・') || line.match(/^[①②③④⑤]/) || line.match(/^\d\./)) || 
          (posMatch && currentText.length > 0)) {
        if (currentCard) {
          cardHTML += `<div class="card-section"><h4>${currentCard}</h4><p>${currentText.join('<br>')}</p></div>`;
        }
        currentCard = line.replace(/^[・①②③④⑤\d\.]\s*/, '');
        currentText = [];
      } else if (line.trim() && currentCard) {
        currentText.push(line.trim());
      }
    });
    if (currentCard && currentText.length > 0) {
      cardHTML += `<div class="card-section"><h4>${currentCard}</h4><p>${currentText.join('<br>')}</p></div>`;
    }

    if (!cardHTML) {
      cardHTML = `<div class="card-section"><p>${cardPart.replace(/\n/g, '<br>')}</p></div>`;
    }

    aiReading.innerHTML = cardHTML + (summaryPart ? 
      `<div class="summary"><h4>🐱 総合的なメッセージ</h4><p>${summaryPart.replace(/\n/g, '<br>')}</p></div>` 
      : '');

  } catch (err) {
    aiResult.classList.remove('show');
    errorMsg.textContent = `エラーが発生しましたにゃ…: ${err.message}`;
    errorMsg.classList.add('show');
    btnAI.disabled = false;
  }

  btnAI.disabled = false;
}

// ============================================================
// リセット
// ============================================================
function resetAll() {
  document.getElementById('questionInput').value = '';
  document.getElementById('aiResult').classList.remove('show');
  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('btnRevealAll').disabled = false;
  drawCards();
  renderGrid();
}

// ============================================================
// 起動
// ============================================================
init();
</script>
