<!DOCTYPE html>
<!-- v3.0 -->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ねこタロット 🐾</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(180deg,#0D0B2A 0%,#130D3A 50%,#0D0B2A 100%); min-height: 100vh; font-family: 'Helvetica Neue', sans-serif; color: #F0EAD6; overflow-x: hidden; }
    ::-webkit-scrollbar { display: none; }
    button { outline: none; font-family: inherit; }

    @keyframes fadeInUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }
    @keyframes pulseGlow { 0%,100%{box-shadow:0 4px 20px rgba(123,47,190,0.5),0 0 28px rgba(201,168,76,0.18)} 50%{box-shadow:0 4px 30px rgba(123,47,190,0.7),0 0 40px rgba(201,168,76,0.35)} }
    @keyframes floatCat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
    @keyframes flipIn { from{transform:rotateY(90deg);opacity:0} to{transform:rotateY(0deg);opacity:1} }
    @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

    #root { max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; }
    canvas#stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

    .screen { position: relative; z-index: 1; padding-bottom: 50px; }

    /* Home */
    .home-header { padding-top: 44px; text-align: center; margin-bottom: 6px; }
    .cat-label { color: #C9A84C; font-size: 10px; letter-spacing: 5px; margin-top: 12px; margin-bottom: 4px; opacity: 0.75; font-family: serif; }
    .home-title { font-size: 26px; font-weight: bold; font-family: serif; margin: 0 0 4px;
      background: linear-gradient(135deg,#C9A84C,#F0EAD6,#C9A84C);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .home-sub { color: rgba(240,234,214,0.55); font-size: 12px; }
    .menu-list { width: 100%; max-width: 400px; padding: 0 18px; margin: 18px auto 0; display: flex; flex-direction: column; gap: 10px; }
    .menu-divider { color: rgba(201,168,76,0.65); font-size: 10px; text-align: center; letter-spacing: 3px; margin-bottom: 14px; }
    .menu-btn { background: linear-gradient(135deg,rgba(26,16,64,0.85),rgba(13,11,42,0.9));
      border: 1px solid rgba(201,168,76,0.3); border-radius: 14px; padding: 13px 16px;
      display: flex; align-items: center; gap: 13px; cursor: pointer; text-align: left;
      box-shadow: 0 2px 14px rgba(0,0,0,0.4); transition: all 0.2s; width: 100%;
      -webkit-tap-highlight-color: transparent; }
    .menu-btn:hover { border-color: rgba(201,168,76,0.65); transform: translateY(-2px); box-shadow: 0 6px 22px rgba(123,47,190,0.3); }
    .menu-icon-wrap { width: 42px; height: 42px; border-radius: 11px; flex-shrink: 0; font-size: 21px;
      background: linear-gradient(135deg,rgba(123,47,190,0.35),rgba(201,168,76,0.18));
      border: 1px solid rgba(201,168,76,0.28); display: flex; align-items: center; justify-content: center; }
    .menu-title { color: #F0EAD6; font-size: 14px; font-weight: bold; font-family: serif; }
    .menu-sub { color: rgba(201,168,76,0.65); font-size: 11px; margin-top: 1px; }
    .menu-arrow { margin-left: auto; color: rgba(201,168,76,0.45); font-size: 18px; }

    /* Fortune topbar */
    .topbar { display: flex; align-items: center; padding: 14px 18px; gap: 10px; }
    .back-btn { background: rgba(26,16,64,0.8); border: 1px solid rgba(201,168,76,0.3);
      border-radius: 10px; color: #C9A84C; padding: 7px 13px; cursor: pointer; font-size: 12px;
      -webkit-tap-highlight-color: transparent; }
    .topbar-title { color: #C9A84C; font-family: serif; font-size: 15px; }

    /* Fortune content */
    .fortune-content { padding: 0 18px 50px; max-width: 440px; margin: 0 auto; }

    /* Intro */
    .intro-wrap { display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 20px; animation: fadeInUp 0.45s ease-out; }
    .intro-box { background: rgba(26,16,64,0.82); border: 1px solid rgba(201,168,76,0.28);
      border-radius: 16px; padding: 14px 18px; text-align: center; width: 100%; }
    .intro-cat-label { color: rgba(201,168,76,0.75); font-size: 11px; margin-bottom: 7px; font-family: serif; }
    .intro-msg { color: #F0EAD6; font-size: 13px; line-height: 1.85; white-space: pre-line; }
    .start-btn { background: linear-gradient(135deg,#7B2FBE,#C9A84C); border: none; border-radius: 50px;
      padding: 13px 38px; color: #F0EAD6; font-size: 15px; font-weight: bold; font-family: serif;
      cursor: pointer; letter-spacing: 2px; animation: pulseGlow 2.2s ease-in-out infinite;
      -webkit-tap-highlight-color: transparent; }

    /* Shuffle */
    .shuffle-wrap { display: flex; flex-direction: column; align-items: center; padding-top: 60px; gap: 24px; }
    .shuffle-label { color: #C9A84C; font-size: 13px; letter-spacing: 2px; animation: pulse 0.9s ease-in-out infinite; }
    .shuffle-cards { position: relative; width: 110px; height: 176px; }
    .shuffle-card { position: absolute; inset: 0; border-radius: 10px; border: 2px solid #C9A84C;
      background: linear-gradient(135deg,#1A1040,#0D0B2A); display: flex; align-items: center; justify-content: center;
      transition: transform 0.3s ease; font-size: 28px; opacity: 0.45; }

    /* Flip cards */
    .flip-hint { color: rgba(201,168,76,0.65); font-size: 11px; text-align: center; margin-bottom: 18px; letter-spacing: 1px; }
    .flip-cards-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 16px; animation: fadeInUp 0.4s ease-out; }
    .flip-card-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .flip-label { color: #C9A84C; font-size: 11px; font-weight: bold; letter-spacing: 1px; text-align: center; }
    .flip-hint-tap { color: rgba(201,168,76,0.55); font-size: 9px; animation: pulse 1.5s ease-in-out infinite; }
    .card-3d { width: 105px; height: 172px; cursor: pointer; perspective: 600px; }
    .card-inner { width: 100%; height: 100%; transform-style: preserve-3d; position: relative; transition: transform 0.65s cubic-bezier(0.4,0,0.2,1); }
    .card-inner.flipped { transform: rotateY(180deg); }
    .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 11px; border: 2px solid #C9A84C; overflow: hidden; }
    .card-back { background: linear-gradient(135deg,#0D0B2A 0%,#1A1040 50%,#0D0B2A 100%);
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      box-shadow: 0 0 18px rgba(201,168,76,0.45); }
    .card-back-inner { position: absolute; inset: 5px; border: 1px solid rgba(201,168,76,0.25); border-radius: 7px; }
    .card-back-paw { font-size: 34px; color: #C9A84C; opacity: 0.8; }
    .card-back-text { font-size: 8px; color: #C9A84C; letter-spacing: 2px; opacity: 0.5; margin-top: 4px; }
    .card-front { transform: rotateY(180deg); background: #0D0B2A; box-shadow: 0 0 24px rgba(201,168,76,0.55); }
    .card-front img { width: 100%; height: 100%; object-fit: cover; border-radius: 9px; }
    .card-front-placeholder { padding: 8px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
    .card-front-placeholder .pla-icon { font-size: 36px; margin-bottom: 6px; }
    .card-front-placeholder .pla-name { color: #C9A84C; font-size: 10px; font-family: serif; line-height: 1.4; }

    /* Result */
    .result-wrap { display: flex; flex-direction: column; gap: 14px; }
    .result-card { background: linear-gradient(135deg,rgba(26,16,64,0.92),rgba(13,11,42,0.97));
      border: 1px solid rgba(201,168,76,0.4); border-radius: 16px; padding: 16px;
      box-shadow: 0 4px 20px rgba(123,47,190,0.2); }
    .result-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .result-header-label { color: #C9A84C; font-size: 11px; font-weight: bold; letter-spacing: 1px; }
    .result-img-wrap { display: flex; justify-content: center; margin-bottom: 12px; }
    .result-img { width: 80px; height: 132px; object-fit: cover; border-radius: 8px; border: 1.5px solid rgba(201,168,76,0.5); box-shadow: 0 0 12px rgba(201,168,76,0.3); }
    .result-card-name { color: #F0EAD6; font-size: 14px; font-weight: bold; margin-bottom: 8px; font-family: serif; }
    .result-cat-msg { background: rgba(123,47,190,0.18); border-radius: 10px; padding: 9px 11px;
      border: 1px solid rgba(123,47,190,0.3); margin-bottom: 8px;
      color: #C9A84C; font-size: 12px; line-height: 1.7; }
    .result-meaning { color: rgba(240,234,214,0.75); font-size: 11px; line-height: 1.7; margin-bottom: 8px; }
    .result-pro { background: rgba(201,168,76,0.08); border-radius: 10px; padding: 9px 11px;
      border: 1px solid rgba(201,168,76,0.2); color: rgba(240,234,214,0.85); font-size: 11px; line-height: 1.8; font-family: serif; font-style: italic; }

    /* Lucky / Quote */
    .special-result { text-align: center; padding-top: 10px; animation: fadeInUp 0.45s ease-out; }
    .special-emoji { font-size: 66px; animation: floatCat 3s ease-in-out infinite; display: inline-block; }
    .special-label { color: #C9A84C; font-size: 12px; letter-spacing: 2px; margin-top: 8px; font-family: serif; }
    .special-box { background: linear-gradient(135deg,rgba(26,16,64,0.92),rgba(13,11,42,0.97));
      border: 2px solid rgba(201,168,76,0.5); border-radius: 18px; padding: 22px 20px;
      text-align: center; box-shadow: 0 0 28px rgba(201,168,76,0.13); animation: fadeInUp 0.45s ease-out 0.1s both;
      margin-top: 14px; }
    .special-type { color: #F0EAD6; font-size: 20px; font-weight: bold; font-family: serif; margin-bottom: 10px; }
    .special-msg { color: rgba(201,168,76,0.9); font-size: 14px; line-height: 1.85; }
    .quote-box { position: relative; }
    .quote-mark { color: rgba(201,168,76,0.25); font-size: 55px; position: absolute; font-family: serif; line-height: 1; }
    .quote-mark.open { top: 6px; left: 14px; }
    .quote-mark.close { bottom: -12px; right: 14px; }
    .quote-text { color: #F0EAD6; font-size: 15px; line-height: 1.95; font-family: serif; position: relative; z-index: 1; padding: 0 18px; }

    /* Buttons */
    .action-btns { display: flex; gap: 10px; margin-top: 6px; animation: fadeInUp 0.45s ease-out 0.3s both; }
    .btn-retry { flex: 1; background: rgba(123,47,190,0.28); border: 1px solid rgba(123,47,190,0.5);
      border-radius: 12px; padding: 11px; color: #C9A84C; font-size: 13px; cursor: pointer; font-family: serif;
      -webkit-tap-highlight-color: transparent; }
    .btn-home { flex: 1; background: rgba(201,168,76,0.13); border: 1px solid rgba(201,168,76,0.38);
      border-radius: 12px; padding: 11px; color: #F0EAD6; font-size: 13px; cursor: pointer; font-family: serif;
      -webkit-tap-highlight-color: transparent; }

    /* Cat SVG */
    .cat-svg-wrap { animation: floatCat 3s ease-in-out infinite; display: inline-block; }

    /* Celtic Cross */
    .celtic-num { color: rgba(201,168,76,0.9); font-size: 9px; font-weight: bold; text-align: center; }
    .celtic-layout { display: flex; gap: 10px; justify-content: center; align-items: flex-start; }
    .celtic-cross { display: grid; grid-template-columns: 60px 60px 60px; grid-template-rows: 100px 100px 100px; gap: 4px; }
    .celtic-staff { display: flex; flex-direction: column; gap: 4px; }
    .celtic-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
    .celtic-cross-card { width: 52px; height: 86px; }
    .celtic-cross-card-rotate { width: 86px; height: 52px; }
  </style>
</head>

const GITHUB_BASE = "https://raw.githubusercontent.com/maemaekaachan-beep/cat-tarot-images/main/";

function getImgUrl(cardName, isReversed) {
  const filename = isReversed ? `${cardName} 逆位置.jpg` : `${cardName}.jpg`;
  const encoded = filename.split("").map(c => {
    if (c === " ") return "%20";
    if (c.charCodeAt(0) > 127) return encodeURIComponent(c);
    return c;
  }).join("");
  return GITHUB_BASE + encoded;
}

function drawCards(count) {
  const shuffled = [...TAROT_CARDS].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, count).map(card => {
    const isReversed = Math.random() < 0.5;
    const base = isReversed ? card.rev : card.up;
    return {
      ...card,
      isReversed,
      current: {
        ...base,
        img: getImgUrl(card.name, isReversed),
        display: card.name + (isReversed ? "（逆位置）" : "（正位置）")
      }
    };
  });
}

// ── Star Field ──
(function() {
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  const stars = Array.from({length: 130}, () => ({
    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + 0.3, alpha: Math.random() * 0.7 + 0.2,
    speed: Math.random() * 0.25 + 0.05, tw: Math.random() * Math.PI * 2,
  }));
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.tw += 0.018;
      const a = s.alpha * (0.55 + 0.45 * Math.sin(s.tw));
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,245,210,${a})`; ctx.fill();
      s.y -= s.speed; s.x -= s.speed * 0.2;
      if (s.y < 0) { s.y = canvas.height; s.x = Math.random() * canvas.width; }
    });
    requestAnimationFrame(draw);
  }
  draw();
  window.addEventListener('resize', resize);
})();

// ── App State ──
let appScreen = 'home';
let appMenu = null;
let fortunePhase = 'intro';
let fortuneCards = [];
let fortuneFlipped = [];
let fortuneResult = null;
let shuffleStep = 0;
let shuffleInterval = null;

const introMsgs = {
  one: "今のあなたに一番大切なメッセージを\n1枚のカードに映し出すニャ。",
  three: "過去・現在・未来\n3枚のカードがあなたの物語を語るニャ。",
  decision: "2つの道を示すニャ！\n心に響いた方を選ぶニャ！",
  release: "今のあなたに必要な\n手放すものと引き寄せるものを示すニャ。",
  celtic: "10枚のカードで\nあなたの状況を深く読み解くニャ。\nゆっくり丁寧に向き合うニャ。",
  omikuji: "今日の運勢を\n猫が占ってあげるニャ！",
  lucky: "今日のラッキー猫を\nお知らせするニャ！",
  quote: "トラさんから\n今日だけの秘密のメッセージを伝えるニャ。",
};

const CELTIC_LABELS = [
  "① 現状・テーマ",
  "② 障害・課題",
  "③ 土台・無意識",
  "④ 過去の影響",
  "⑤ 可能性・目標",
  "⑥ 近い未来",
  "⑦ あなた自身",
  "⑧ 周囲の影響",
  "⑨ 希望と恐れ",
  "⑩ 最終結果",
];

const OMIKUJI_LIST = [
  { fortune: "大吉", color: "#FFD700", msg: "最高の運気だニャ！思い切って行動するのが吉ニャ！", detail: "恋愛◎ 仕事◎ 健康◎ 金運◎", cat: "三毛猫があなたを守っているニャ！" },
  { fortune: "中吉", color: "#C9A84C", msg: "良い流れが来てるニャ。自信を持って進むニャ！", detail: "恋愛○ 仕事○ 健康○ 金運○", cat: "白猫が幸運を運んでくるニャ！" },
  { fortune: "小吉", color: "#90EE90", msg: "小さな幸せがたくさんある日ニャ。丁寧に過ごすニャ。", detail: "恋愛○ 仕事△ 健康○ 金運△", cat: "ハチワレ猫が見守っているニャ。" },
  { fortune: "吉", color: "#87CEEB", msg: "穏やかな一日になりそうだニャ。感謝を忘れずニャ。", detail: "恋愛△ 仕事○ 健康◎ 金運△", cat: "キジトラ猫が癒してくれるニャ。" },
  { fortune: "末吉", color: "#DDA0DD", msg: "今日はおとなしく過ごすのが吉ニャ。焦りは禁物ニャ。", detail: "恋愛△ 仕事△ 健康○ 金運△", cat: "グレー猫がそっと寄り添うニャ。" },
  { fortune: "凶", color: "#FF8C94", msg: "ちょっと注意が必要な日ニャ。でも猫パンチで乗り越えるニャ！", detail: "恋愛▲ 仕事▲ 健康△ 金運▲", cat: "黒猫が魔除けしてくれてるニャ！" },
];

function getLabel(menuId, i) {
  if (menuId === 'three') return ["🕰️ 過去","🌱 現在","🚀 未来"][i];
  if (menuId === 'decision') return ["選択肢 A","選択肢 B"][i];
  if (menuId === 'release') return ["🍃 手放すもの","🌟 引き寄せるもの"][i];
  if (menuId === 'celtic') return CELTIC_LABELS[i];
  return null;
}

// ── Render ──
function render() {
  const root = document.getElementById('root');
  if (appScreen === 'home') {
    root.innerHTML = renderHome();
  } else {
    root.innerHTML = renderFortune();
  }
  attachEvents();
}

function renderHome() {
  const menuItems = MENUS.map((menu, i) => `
    <button class="menu-btn" data-menu="${menu.id}" style="animation: fadeInUp 0.4s ease-out ${i * 0.06}s both">
      <div class="menu-icon-wrap">${menu.icon}</div>
      <div>
        <div class="menu-title">${menu.title}</div>
        <div class="menu-sub">${menu.sub}</div>
      </div>
      <div class="menu-arrow">›</div>
    </button>`).join('');

  return `<div class="screen">
    <div class="home-header">
      ${makeCatSVG(96)}
      <div class="cat-label">✦ MYSTIC CAT ORACLE ✦</div>
      <h1 class="home-title">ねこタロット</h1>
      <div class="home-sub">神秘の猫からのメッセージ</div>
    </div>
    <div class="menu-list">
      <div class="menu-divider">── 今日、どんな占いをする？ ──</div>
      ${menuItems}
    </div>
  </div>`;
}

function renderFortune() {
  let content = '';
  if (fortunePhase === 'intro') content = renderIntro();
  else if (fortunePhase === 'shuffle') content = renderShuffle();
  else if (fortunePhase === 'flip') content = renderFlip();
  else if (fortunePhase === 'result') content = renderResult();

  return `<div class="screen">
    <div class="topbar">
      <button class="back-btn" id="btn-back">← 戻る</button>
      <span class="topbar-title">${appMenu.icon} ${appMenu.title}</span>
    </div>
    <div class="fortune-content">${content}</div>
  </div>`;
}

function renderIntro() {
  return `<div class="intro-wrap">
    ${makeCatSVG(84)}
    <div class="intro-box">
      <div class="intro-cat-label">🐈 猫からのひとこと</div>
      <div class="intro-msg">${introMsgs[appMenu.id]}</div>
    </div>
    <button class="start-btn" id="btn-start">
      ${appMenu.cards > 0 ? '✨ カードを引く ✨' : '✨ 占ってもらう ✨'}
    </button>
  </div>`;
}

function renderShuffle() {
  const cards = [0,1,2].map(i => {
    const rot = (shuffleStep % 2 === 0 ? 1 : -1) * (i - 1) * 9;
    const ty = (i - 1) * -6;
    return `<div class="shuffle-card" style="transform:rotate(${rot}deg) translateY(${ty}px)">🐾</div>`;
  }).join('');
  return `<div class="shuffle-wrap">
    <div class="shuffle-label">✦ カードをシャッフル中 ✦</div>
    <div class="shuffle-cards">${cards}</div>
  </div>`;
}

function makeCardHtml(card, i, small) {
  const lbl = getLabel(appMenu.id, i);
  const isFlipped = fortuneFlipped.includes(i);
  const w = small ? 72 : 105;
  const h = small ? 118 : 172;
  const front = card.current.img
    ? `<img src="${card.current.img}" alt="${card.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      + `<div class="card-front-placeholder" style="display:none"><div class="pla-icon">🃏</div><div class="pla-name">${card.current.display}</div></div>`
    : `<div class="card-front-placeholder"><div class="pla-icon">🃏</div><div class="pla-name">${card.current.display}</div></div>`;
  return `<div class="flip-card-wrap">
    ${lbl && small ? `<div class="celtic-num">${lbl}</div>` : lbl ? `<div class="flip-label">${lbl}</div>` : ''}
    <div class="card-3d" data-card="${i}" style="width:${w}px;height:${h}px;${isFlipped ? 'cursor:default' : ''}">
      <div class="card-inner ${isFlipped ? 'flipped' : ''}">
        <div class="card-face card-back">
          <div class="card-back-inner"></div>
          <div class="card-back-paw" style="font-size:${small?22:34}px">🐾</div>
          <div class="card-back-text">ねこタロット</div>
        </div>
        <div class="card-face card-front">${front}</div>
      </div>
    </div>
    ${!isFlipped ? '<div class="flip-hint-tap">タップ ✦</div>' : ''}
  </div>`;
}

function makeCelticCard(i, rotate) {
  const card = fortuneCards[i];
  const lbl = CELTIC_LABELS[i];
  const isFlipped = fortuneFlipped.includes(i);
  const w = rotate ? 86 : 52;
  const h = rotate ? 52 : 86;
  const front = card.current.img
    ? `<img src="${card.current.img}" alt="${card.name}" style="width:100%;height:100%;object-fit:cover;border-radius:6px${rotate ? ';transform:rotate(-90deg);transform-origin:center' : ''}" onerror="this.style.display='none'">`
    : `<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;color:#C9A84C;font-size:8px;text-align:center;padding:2px">${card.current.display}</div>`;
  return `<div class="celtic-cell">
    <div class="celtic-num">${lbl.substring(0,2)}</div>
    <div data-card="${i}" style="width:${w}px;height:${h}px;cursor:${isFlipped?'default':'pointer'};perspective:400px;flex-shrink:0" onclick="handleCelticFlip(${i})">
      <div style="width:100%;height:100%;transform-style:preserve-3d;position:relative;transition:transform 0.65s cubic-bezier(0.4,0,0.2,1);transform:${isFlipped?'rotateY(180deg)':'rotateY(0deg)'}">
        <div style="position:absolute;inset:0;backface-visibility:hidden;border-radius:6px;border:1.5px solid #C9A84C;background:linear-gradient(135deg,#0D0B2A,#1A1040);display:flex;align-items:center;justify-content:center;font-size:18px;opacity:0.8">🐾</div>
        <div style="position:absolute;inset:0;backface-visibility:hidden;border-radius:6px;border:1.5px solid #C9A84C;transform:rotateY(180deg);overflow:hidden;background:#0D0B2A">${front}</div>
      </div>
    </div>
    ${!isFlipped ? '<div style="color:rgba(201,168,76,0.55);font-size:8px;animation:pulse 1.5s ease-in-out infinite">タップ</div>' : ''}
  </div>`;
}

function renderFlip() {
  if (appMenu.id === 'celtic') {
    // 正式なケルト十字配置
    // ①現状(0) ②障害(1,横) ③土台(2) ④過去(3) ⑤目標(4) ⑥近未来(5)
    // ⑦自身(6) ⑧周囲(7) ⑨希望(8) ⑩結果(9) - スタッフ縦列
    const crossHtml = `
      <div style="display:flex;gap:8px;justify-content:center;align-items:flex-start">
        <div style="display:grid;grid-template-columns:60px 96px 60px;grid-template-rows:96px 96px 96px;gap:4px;align-items:center;justify-items:center">
          <div></div>${makeCelticCard(4, false)}<div></div>
          ${makeCelticCard(2, false)}
          <div style="position:relative;display:flex;align-items:center;justify-content:center;width:96px;height:96px">
            <div style="position:absolute">${makeCelticCard(0, false)}</div>
            <div style="position:absolute;opacity:0.85">${makeCelticCard(1, true)}</div>
          </div>
          ${makeCelticCard(3, false)}
          <div></div>${makeCelticCard(5, false)}<div></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          ${makeCelticCard(9, false)}
          ${makeCelticCard(8, false)}
          ${makeCelticCard(7, false)}
          ${makeCelticCard(6, false)}
        </div>
      </div>`;
    return `<div>
      <div class="flip-hint">①から順番にタップしてめくるニャ 🐾</div>
      ${crossHtml}
    </div>`;
  }
  const gap = fortuneCards.length > 2 ? 10 : 16;
  const cardHtml = fortuneCards.map((card, i) => makeCardHtml(card, i, false)).join('');
  return `<div>
    <div class="flip-hint">カードをタップしてめくるニャ 🐾</div>
    <div class="flip-cards-row" style="gap:${gap}px">${cardHtml}</div>
  </div>`;
}

function renderResult() {
  if (!fortuneResult) return '';
  let html = '';

  if (fortuneResult.type === 'lucky') {
    const d = fortuneResult.data;
    const imgUrl = `https://raw.githubusercontent.com/maemaekaachan-beep/cat-tarot-images/main/${d.img}`;
    html = `<div class="special-result">
      <div class="special-label">🐈 今日のラッキーキャット</div>
    </div>
    <div class="special-box" style="display:flex;flex-direction:column;align-items:center">
      <img src="${imgUrl}" alt="${d.type}"
        style="width:160px;height:160px;object-fit:cover;border-radius:50%;border:3px solid rgba(201,168,76,0.6);box-shadow:0 0 24px rgba(201,168,76,0.3);margin-bottom:14px"
        onerror="this.style.display='none'">
      <div class="special-type">「${d.type}」${d.emoji}</div>
      <div class="special-msg">${d.msg}</div>
    </div>`;
  } else if (fortuneResult.type === 'quote') {
    html = `<div class="special-result">
      <div class="special-emoji" style="font-size:56px">🐅</div>
      <div class="special-label">トラさんの秘密の格言</div>
    </div>
    <div class="special-box quote-box">
      <div class="quote-mark open">"</div>
      <div class="quote-text">${fortuneResult.data}</div>
      <div class="quote-mark close">"</div>
    </div>`;
  } else if (fortuneResult.type === 'omikuji') {
    const d = fortuneResult.data;
    const today = new Date();
    const dateStr = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`;
    html = `<div class="special-result">
      <div class="special-emoji" style="font-size:56px">🎋</div>
      <div class="special-label">今日のおみくじ</div>
      <div style="color:rgba(201,168,76,0.6);font-size:11px;margin-top:4px">${dateStr}</div>
    </div>
    <div class="special-box" style="display:flex;flex-direction:column;align-items:center;gap:12px">
      <div style="font-size:52px;font-weight:bold;font-family:serif;color:${d.color};text-shadow:0 0 20px ${d.color}66;animation:pulseGlow 2s ease-in-out infinite">${d.fortune}</div>
      <div style="width:100%;background:rgba(255,255,255,0.05);border-radius:10px;padding:10px 14px;border:1px solid rgba(201,168,76,0.2)">
        <div style="color:#C9A84C;font-size:11px;margin-bottom:6px;letter-spacing:1px">🌟 運勢</div>
        <div style="color:#F0EAD6;font-size:13px;line-height:1.7">${d.detail}</div>
      </div>
      <div style="color:rgba(240,234,214,0.9);font-size:14px;line-height:1.8;text-align:center">${d.msg}</div>
      <div style="color:#C9A84C;font-size:12px;font-style:italic">🐱 ${d.cat}</div>
    </div>`;
  } else {
    html = fortuneResult.data.map((card, i) => {
      const lbl = getLabel(appMenu.id, i) || '🔮 カード';
      const imgHtml = card.current.img
        ? `<div class="result-img-wrap"><img class="result-img" src="${card.current.img}" alt="${card.name}" onerror="this.parentElement.style.display='none'"></div>`
        : '';
      return `<div class="result-card" style="animation: fadeInUp 0.45s ease-out ${i * 0.12}s both">
        <div class="result-header"><span style="font-size:16px">🔮</span><span class="result-header-label">${lbl}</span></div>
        ${imgHtml}
        <div class="result-card-name">${card.current.display}</div>
        <div class="result-cat-msg">😺 ${card.current.cat}</div>
        <div class="result-meaning">📜 ${card.current.msg}</div>
        ${card.current.pro ? `<div class="result-pro">✨ ${card.current.pro}</div>` : ''}
      </div>`;
    }).join('');
  }

  return `<div class="result-wrap">
    ${html}
    <div class="action-btns">
      <button class="btn-retry" id="btn-retry">🔄 もう一度</button>
      <button class="btn-home" id="btn-home-from-result">🏠 ホームへ</button>
    </div>
  </div>`;
}

// ── Events ──
function attachEvents() {
  document.querySelectorAll('.menu-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.menu;
      appMenu = MENUS.find(m => m.id === id);
      appScreen = 'fortune';
      fortunePhase = 'intro';
      fortuneCards = [];
      fortuneFlipped = [];
      fortuneResult = null;
      render();
    });
  });

  const backBtn = document.getElementById('btn-back');
  if (backBtn) backBtn.addEventListener('click', () => {
    appScreen = 'home';
    if (shuffleInterval) { clearInterval(shuffleInterval); shuffleInterval = null; }
    render();
  });

  const startBtn = document.getElementById('btn-start');
  if (startBtn) startBtn.addEventListener('click', handleStart);

  document.querySelectorAll('.card-3d').forEach(el => {
    el.addEventListener('click', () => {
      const i = parseInt(el.dataset.card);
      if (!fortuneFlipped.includes(i)) {
        fortuneFlipped = [...fortuneFlipped, i];
        render();
        if (fortuneFlipped.length === fortuneCards.length) {
          setTimeout(() => {
            fortuneResult = { type: 'cards', data: fortuneCards };
            fortunePhase = 'result';
            render();
          }, 900);
        }
      }
    });
  });

  const retryBtn = document.getElementById('btn-retry');
  if (retryBtn) retryBtn.addEventListener('click', () => {
    fortunePhase = 'intro';
    fortuneCards = [];
    fortuneFlipped = [];
    fortuneResult = null;
    render();
  });

  const homeFromResult = document.getElementById('btn-home-from-result');
  if (homeFromResult) homeFromResult.addEventListener('click', () => {
    appScreen = 'home';
    render();
  });
}

function handleCelticFlip(i) {
  if (!fortuneFlipped.includes(i)) {
    fortuneFlipped = [...fortuneFlipped, i];
    render();
    if (fortuneFlipped.length === fortuneCards.length) {
      setTimeout(() => {
        fortuneResult = { type: 'cards', data: fortuneCards };
        fortunePhase = 'result';
        render();
      }, 900);
    }
  }
}

function handleStart() {
  if (appMenu.id === 'lucky') {
    fortuneResult = { type: 'lucky', data: LUCKY_CATS[Math.floor(Math.random() * LUCKY_CATS.length)] };
    fortunePhase = 'result';
    render();
    return;
  }
  if (appMenu.id === 'quote') {
    fortuneResult = { type: 'quote', data: QUOTES[Math.floor(Math.random() * QUOTES.length)] };
    fortunePhase = 'result';
    render();
    return;
  }
  if (appMenu.id === 'omikuji') {
    // 日付ベースで今日の運勢を決める（同じ日は同じ結果）
    const today = new Date();
    const seed = today.getFullYear() * 10000 + (today.getMonth()+1) * 100 + today.getDate();
    const idx = seed % OMIKUJI_LIST.length;
    fortuneResult = { type: 'omikuji', data: OMIKUJI_LIST[idx] };
    fortunePhase = 'result';
    render();
    return;
  }
  fortuneCards = drawCards(appMenu.cards);
  fortuneFlipped = [];
  fortunePhase = 'shuffle';
  shuffleStep = 0;
  render();
  let s = 0;
  shuffleInterval = setInterval(() => {
    s++;
    shuffleStep = s;
    render();
    if (s >= 5) {
      clearInterval(shuffleInterval);
      shuffleInterval = null;
      setTimeout(() => { fortunePhase = 'flip'; render(); }, 200);
    }
  }, 320);
}

// ── Start ──
render();
</script>
